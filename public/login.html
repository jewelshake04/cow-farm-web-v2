<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>লগইন - গরুর খামার</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Hind Siliguri', sans-serif;
    background: linear-gradient(135deg, #1a4731 0%, #2d7a4f 50%, #1a4731 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: rgba(255,255,255,0.97);
    border-radius: 20px; padding: 48px 40px; width: 380px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.3);
  }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo-icon { font-size: 56px; display: block; margin-bottom: 8px; }
  .logo h1 { font-size: 22px; font-weight: 700; color: #1a4731; }
  .logo p { font-size: 13px; color: #666; margin-top: 4px; }
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-size: 14px; font-weight: 600; color: #333; margin-bottom: 6px; }
  .form-group input {
    width: 100%; padding: 12px 16px;
    border: 2px solid #e0e0e0; border-radius: 10px;
    font-size: 15px; font-family: 'Hind Siliguri', sans-serif;
    outline: none; transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: #2d7a4f; }
  .btn-login {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #2d7a4f, #1a4731);
    color: white; border: none; border-radius: 10px;
    font-size: 16px; font-weight: 700; font-family: 'Hind Siliguri', sans-serif;
    cursor: pointer; margin-top: 8px; transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(45,122,79,0.4); }
  .error { color: #e53935; font-size: 13px; text-align: center; margin-top: 12px; display: none; }
  .hint { text-align: center; font-size: 12px; color: #999; margin-top: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="logo-icon">🐄</span>
    <h1>গরুর খামার ম্যানেজমেন্ট</h1>
    <p>আপনার খামার পরিচালনা করুন সহজে</p>
  </div>
  <div class="form-group">
    <label>ইউজারনেম</label>
    <input type="text" id="username" placeholder="ইউজারনেম লিখুন" value="admin">
  </div>
  <div class="form-group">
    <label>পাসওয়ার্ড</label>
    <input type="password" id="password" placeholder="পাসওয়ার্ড লিখুন" value="admin123">
  </div>
  <button class="btn-login" onclick="doLogin()">🔓 লগইন করুন</button>
  <div class="error" id="err"></div>
  <div class="hint">ডিফল্ট: admin / admin123</div>
</div>
<script>
document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  if (!username || !password) { showErr('ইউজারনেম ও পাসওয়ার্ড দিন'); return; }
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({username, password})
  });
  const result = await res.json();
  if (result.success) window.location.href = '/app';
  else showErr(result.message);
}
function showErr(msg) {
  const e = document.getElementById('err');
  e.textContent = '⚠️ ' + msg;
  e.style.display = 'block';
  setTimeout(() => e.style.display = 'none', 3000);
}
</script>
</body>
</html>
